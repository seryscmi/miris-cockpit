<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M.IRIS Cockpit">
<meta name="theme-color" content="#efefef">
<link rel="manifest" href="manifest.json">
<title>M.IRIS Cockpit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20fill='%23efefef'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='30'%20fill='none'%20stroke='%231c1c1c'%20stroke-width='6'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='11'%20fill='%231c1c1c'/%3E%3C/svg%3E">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
:root{
  --ink:#1c1c1c; --ink2:#5a5a5a; --paper:#efefef; --surface:#ffffff; --surface2:#e6e6e6;
  --line:#e4e4e4; --line2:#d6d6d6;
  --accent:#1c1c1c;
  --warn:#b8860b; --warn-bg:#f6edd4;
  --danger:#a33131; --danger-bg:#f3dede;
  --ok:#2f6b46; --ok-bg:#dcecdf;
  --info:#3a5a78; --info-bg:#dde6ee;
  --muted:#7a7a7a; --muted-bg:#e2e2e2;
  --topbar-h:56px; --nav-h:60px;
  --serif:"Bodoni Moda","Bodoni 72",Didot,"Playfair Display",Georgia,"Times New Roman",serif;
  --sans:"Nunito","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  min-height:100vh; min-height:100dvh; line-height:1.45;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
body.no-scroll{overflow:hidden}
button,input,select,textarea{font-family:inherit;font-size:16px;color:inherit}
a{color:inherit}
h1{font-family:var(--serif);font-weight:600;letter-spacing:.1em;text-transform:uppercase;line-height:1.2}
h2,h3{font-family:var(--sans);font-weight:800;font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink2);line-height:1.3}
.serif{font-family:var(--serif)}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

/* ---------- Layout shell ---------- */
#topbar{
  position:sticky; top:0; z-index:40; height:var(--topbar-h);
  padding-top:env(safe-area-inset-top);
  background:var(--paper); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:12px; padding-left:16px; padding-right:16px;
}
#topbar .brand{font-family:var(--serif);font-weight:700;letter-spacing:.22em;text-transform:uppercase;font-size:16px}
#topbar .tb-title{font-family:var(--serif);letter-spacing:.14em;text-transform:uppercase;font-size:13px;color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar .tb-icon{background:none;border:none;color:var(--ink);width:38px;height:38px;font-size:18px;line-height:1;cursor:pointer;padding:0;transition:background .15s}
#topbar .tb-icon:hover{background:rgba(28,28,28,.06)}
#topbar .tb-icon:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
#topbar .tb-icon.spinning{animation:sp 1s linear infinite}
#topbar .tb-mode{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2)}
#topbar .tb-mode::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--line2)}
#topbar .tb-mode.live{color:var(--ink)}
#topbar .tb-mode.live::before{background:var(--ok)}

.wrap{display:flex;min-height:calc(100dvh - var(--topbar-h))}
#sidenav{display:none}
@media(min-width:860px){
  #sidenav{
    display:flex;flex-direction:column;width:210px;flex:0 0 210px;
    border-right:1px solid var(--line);padding:14px 10px;gap:2px;
    position:sticky;top:var(--topbar-h);height:calc(100dvh - var(--topbar-h));
  }
  #sidenav a{
    display:flex;align-items:center;gap:10px;padding:11px 12px;text-decoration:none;
    font-size:13px;letter-spacing:.04em;color:var(--ink2);border:1px solid transparent;
  }
  #sidenav a .ico{width:18px;text-align:center}
  #sidenav a.active{background:var(--surface);color:var(--ink);font-weight:700}
  #sidenav a .n-badge{margin-left:auto;background:var(--ink);color:var(--paper);font-size:10px;padding:1px 6px;min-width:18px;text-align:center}
  #bottomnav{display:none !important}
}
#app{flex:1;min-width:0;padding:18px 16px calc(env(safe-area-inset-bottom) + 34px);max-width:1200px;margin:0 auto;width:100%}
@media(min-width:860px){#app{padding-bottom:40px}}

#bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--paper);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:stretch;
}
#bottomnav a{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  text-decoration:none;color:var(--ink2);font-size:9px;letter-spacing:.04em;text-transform:uppercase;position:relative;
}
#bottomnav a .ico{font-size:19px;line-height:1}
#bottomnav a.active{color:var(--ink)}
#bottomnav a.active .ico{transform:translateY(-1px)}
#bottomnav a .n-dot{position:absolute;top:8px;right:calc(50% - 18px);background:var(--danger);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* ---------- Topbar-Logo, Lock, Startbildschirm ---------- */
#topbar #tb-logo{display:flex;align-items:center;height:100%;text-decoration:none}
#topbar #tb-logo img{height:24px;width:auto;display:block}
#bottomnav{display:none !important}

#lockscreen{position:fixed;inset:0;z-index:300;background:var(--paper);display:none;align-items:center;justify-content:center;padding:24px;padding-top:calc(env(safe-area-inset-top) + 24px)}
#lockscreen.show{display:flex}
#lockscreen .lock-box{width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
#lockscreen .lock-logo{width:190px;max-width:72%;height:auto;margin-bottom:6px}
#lockscreen .lock-hint{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2)}
#lockscreen .lock-or{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)}
#lockscreen #lock-input{width:100%;text-align:center;font-size:26px;letter-spacing:.42em;padding:14px 10px;border:1px solid var(--line2);background:var(--surface);color:var(--ink)}
#lockscreen #lock-input:focus{outline:2px solid var(--ink);outline-offset:2px}
#lockscreen .lock-err{font-size:13px;color:var(--danger);min-height:18px}
#lockscreen .shake{animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:4px}
@media(min-width:560px){.home-grid{grid-template-columns:repeat(3,1fr)}}
.home-tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;aspect-ratio:1/1;background:var(--surface);text-decoration:none;color:var(--ink);transition:transform .16s cubic-bezier(.22,1,.36,1),box-shadow .16s}
.home-tile:active{transform:scale(.96)}
.home-tile:hover{box-shadow:0 3px 14px rgba(28,28,28,.1)}
.home-tile .home-ico{font-size:34px;line-height:1}
.home-tile .home-label{font-size:13px;font-weight:700;letter-spacing:.02em;text-align:center;padding:0 6px}
.home-tile .home-badge{position:absolute;top:10px;right:10px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
@media (prefers-reduced-motion: reduce){ .home-tile{transition:none} }

/* ---------- Components ---------- */
.page-head{margin:10px 0 22px}
.page-head h1{font-size:19px;margin-bottom:5px}
.page-head p{color:var(--ink2);font-size:13px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
.card{background:var(--surface);padding:20px}
.card + .card{margin-top:14px}
.muted{color:var(--ink2)}
.small{font-size:12px}
.tiny{font-size:11px;letter-spacing:.04em}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border:none;background:none;color:var(--ink);font-weight:700;
  padding:10px 14px;cursor:pointer;font-size:13px;letter-spacing:.02em;
  min-height:42px;text-decoration:none;
  transition:background .16s cubic-bezier(.22,1,.36,1),color .16s cubic-bezier(.22,1,.36,1);
}
.btn:hover{background:rgba(28,28,28,.06)}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:#000}
.btn-ghost{color:var(--ink2);font-weight:600}
.btn-ghost:hover{color:var(--ink);background:rgba(28,28,28,.05)}
.btn-danger{color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{min-height:36px;padding:7px 11px;font-size:12.5px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-block{width:100%}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;letter-spacing:.02em;color:var(--ink2);white-space:nowrap}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--muted);flex:0 0 6px}
.badge.warn::before{background:var(--warn)}
.badge.danger{color:var(--danger)} .badge.danger::before{background:var(--danger)}
.badge.ok::before{background:var(--ok)}
.badge.info::before{background:var(--info)}
.badge.ink{background:var(--ink);color:var(--paper);padding:2px 8px} .badge.ink::before{display:none}

label.field{display:block;margin-bottom:12px}
label.field > span{display:block;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:5px}
input[type=text],input[type=password],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--surface);border:1px solid var(--line2);padding:11px 12px;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--ink)}
textarea{resize:vertical;min-height:90px;line-height:1.5}

/* KPI grid */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:560px){.kpis{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--line);padding:14px}
.kpi .k-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.kpi .k-val{font-family:var(--serif);font-size:26px;font-weight:600;margin-top:6px;letter-spacing:.02em}
.kpi .k-sub{font-size:11px;color:var(--ink2);margin-top:2px}

/* Heute: Stat-Chips + Aktions-Warteschlange */
.stat-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.stat-chip{flex:0 0 auto;display:flex;flex-direction:column;gap:2px;min-width:106px;padding:14px 16px;background:var(--surface);text-decoration:none;transition:box-shadow .18s cubic-bezier(.22,1,.36,1)}
.stat-chip:hover{box-shadow:0 2px 10px rgba(28,28,28,.09)}
.stat-chip .sc-v{font-size:20px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.stat-chip .sc-l{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2)}
.q-card{padding:0;margin-top:12px}
.q-head{display:flex;align-items:center;gap:10px;padding:14px 20px 10px}
.q-head h2{margin:0;flex:1}
.q-count{font-family:var(--sans);font-size:12px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.q-row{display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid var(--line)}

.q-row .q-main{flex:1;min-width:0;text-decoration:none;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media (prefers-reduced-motion: reduce){ .stat-chip{transition:none} .spin{animation:none} }

/* Filter-Chips (Bestellungen) */
.chip-row{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:6px}
.f-chip{flex:0 0 auto;background:var(--surface);border:none;padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--ink2);transition:all .15s cubic-bezier(.22,1,.36,1)}
.f-chip b{color:inherit;font-weight:800;margin-left:2px}
.f-chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.f-chip.hot:not(.on){color:var(--danger)}
@media (prefers-reduced-motion: reduce){ .f-chip{transition:none} }

/* Category chips row */
.catgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:640px){.catgrid{grid-template-columns:repeat(4,1fr)}}
.catchip{border:1px solid var(--line);background:var(--surface);padding:11px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:3px}
.catchip:hover{background:var(--surface2)}
.catchip .cc-n{font-family:var(--serif);font-size:24px;font-weight:600}
.catchip .cc-l{font-size:11px;color:var(--ink2);letter-spacing:.02em;line-height:1.25}
.catchip.hot .cc-n{color:var(--danger)}

/* Kanban board */
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.col{flex:0 0 272px;scroll-snap-align:start;background:rgba(28,28,28,.035);display:flex;flex-direction:column;max-height:calc(100dvh - 220px)}
.col-h{padding:12px 14px 8px;position:sticky;top:0;background:transparent;display:flex;align-items:center;gap:8px}
.col-h .c-t{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--ink2)}
.col-h .c-c{margin-left:auto;font-size:11px;font-weight:800;color:var(--ink)}
.col-body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.ocard{background:var(--surface);padding:12px;cursor:pointer;transition:transform .16s cubic-bezier(.22,1,.36,1),box-shadow .16s}
.ocard:hover{box-shadow:0 2px 10px rgba(28,28,28,.09)}
.ocard .o-top{display:flex;align-items:baseline;gap:8px}
.ocard .o-name{font-family:var(--serif);font-weight:700;letter-spacing:.04em}
.ocard .o-total{margin-left:auto;font-weight:700}
.ocard .o-cust{font-size:12px;color:var(--ink2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ocard .o-meta{font-size:11px;color:var(--ink2);margin-top:4px}
.ocard .o-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}

/* list view */
.list-item{background:var(--surface);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:box-shadow .16s}
.list-item:hover{box-shadow:0 2px 10px rgba(28,28,28,.09)}
.list-item + .list-item{margin-top:8px}

/* toggles */
.toggle-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.toggle-row:last-child{border-bottom:none}
.toggle-row .t-l{flex:1;font-size:13px}
.switch{position:relative;width:44px;height:26px;flex:0 0 44px}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .sl{position:absolute;inset:0;background:var(--line2);cursor:pointer;transition:.15s}
.switch .sl:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;transition:.15s}
.switch input:checked + .sl{background:var(--ink)}
.switch input:checked + .sl:before{transform:translateX(18px)}

/* segmented */
.seg{display:inline-flex;border:1px solid var(--line2)}
.seg button{background:var(--surface);border:none;border-right:1px solid var(--line2);padding:8px 13px;cursor:pointer;font-size:12px;letter-spacing:.03em}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--ink);color:var(--paper)}

.empty{text-align:center;padding:48px 20px;color:var(--ink2)}
.empty .e-ico{font-size:38px;margin-bottom:12px}
.empty p{margin-bottom:16px;max-width:420px;margin-left:auto;margin-right:auto}

.divider{height:1px;background:var(--line);margin:16px 0}
.kv{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.kv .k{width:130px;flex:0 0 130px;color:var(--ink2);font-size:12px;letter-spacing:.03em}
.kv .v{flex:1;word-break:break-word}
.thumb{width:64px;height:64px;object-fit:cover;border:1px solid var(--line2);background:var(--surface2)}
.imgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}

/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .dow{text-align:center;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);padding:4px 0}
.cal .cell{aspect-ratio:1;border:1px solid var(--line);background:var(--surface);padding:5px;cursor:pointer;display:flex;flex-direction:column;font-size:12px;position:relative}
.cal .cell:hover{border-color:var(--ink)}
.cal .cell.other{opacity:.4}
.cal .cell.today{border-color:var(--ink);border-width:2px}
.cal .cell .cnum{font-weight:700}
.cal .cell .cdot{position:absolute;bottom:4px;left:5px;right:5px;height:4px}
.cal .cell .cdot span{display:inline-block;width:5px;height:5px;background:var(--ink);margin-right:2px}
.cal .cell .cdot .open{background:var(--warn)}

/* modal + toast */
#modal-root{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;padding:0;background:rgba(20,20,20,.45)}
#modal-root.open{display:flex}
.modal{background:var(--surface);max-width:100%;width:100%;max-height:92dvh;overflow-y:auto;padding:24px 20px calc(20px + env(safe-area-inset-bottom))}
.modal h2{font-family:var(--serif);font-size:16px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin-bottom:12px}
@media(min-width:640px){
  #modal-root{align-items:center;padding:20px}
  .modal{max-width:560px;padding:26px 26px 22px}
}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
#toast-root{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);z-index:80;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px}
@media(min-width:860px){#toast-root{bottom:20px}}
.toast{background:var(--ink);color:var(--paper);padding:11px 16px;font-size:13px;max-width:460px;box-shadow:0 6px 24px rgba(0,0,0,.25)}

.notice{border:1px solid var(--line2);background:var(--surface);padding:12px 14px;font-size:13px;color:var(--ink2);display:flex;gap:10px}
.notice .ni{font-size:16px}
.notice.warn{background:var(--warn-bg);border-color:#e2cf9a;color:#7a5b0a}

.codebox{background:var(--ink);color:#e8e8e8;padding:14px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.55;overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--paper);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="lockscreen"></div>
<div id="topbar">
  <a href="#/home" id="tb-logo" aria-label="Startbildschirm"><img id="tb-logo-img" alt="M.IRIS"></a>
  <span class="spacer"></span>
  <button class="tb-icon" id="tb-search" title="Suchen" aria-label="Suchen">⌕</button>
  <button class="tb-icon" id="tb-sync" title="Aktualisieren" aria-label="Aktualisieren">⟳</button>
  <span class="tb-mode" id="tb-mode">Import</span>
</div>
<div class="wrap">
  <nav id="sidenav"></nav>
  <main id="app"></main>
</div>
<nav id="bottomnav"></nav>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
"use strict";
/* ======================================================================
   M.IRIS Operations-Cockpit — Phase 1 (statische PWA, localStorage)
   ====================================================================== */

/* ---------- Store: einziger localStorage-Pfad, mit In-Memory-Fallback ---------- */
const Store = (() => {
  const mem = {}; let available = false;
  try { localStorage.setItem("miris.__test","1"); localStorage.removeItem("miris.__test"); available = true; }
  catch(e){ available = false; }
  return {
    available,
    get(key, fb){ try{ const raw = available ? localStorage.getItem(key) : mem[key]; return (raw==null)?fb:JSON.parse(raw); }catch(e){ return fb; } },
    set(key, val){ let raw; try{ raw = JSON.stringify(val); }catch(e){ return false; }
      try{ if(available) localStorage.setItem(key,raw); else mem[key]=raw; return true; }
      catch(e){ toast("Speichern fehlgeschlagen – Speicher voll? Bitte Backup exportieren."); return false; } },
    remove(key){ try{ if(available) localStorage.removeItem(key); else delete mem[key]; }catch(e){} }
  };
})();

/* ---------- Sanitizer ---------- */
function num(v,d){ const n=Number(v); return isFinite(n)?n:(d||0); }
function str(v,max){ return String(v==null?"":v).slice(0,max||2000); }
function tsMs(v){ if(v==null||v==="") return null; if(typeof v==="number") return v; const t=Date.parse(v); return isNaN(t)?null:t; }

function DEFAULT_LOCAL(){ return { previewSentAt:null, mahnungSentAt:null, shippedMarkedAt:null, manualCategory:null, notes:"", done:false }; }

function sanitizeOrder(o){
  if(!o || typeof o!=="object" || !o.name) return null;
  const local = Object.assign(DEFAULT_LOCAL(), (o.local&&typeof o.local==="object")?o.local:{});
  local.notes = str(local.notes,2000); local.done = !!local.done;
  local.manualCategory = (CATS.includes(local.manualCategory))?local.manualCategory:null;
  const lineItems = (Array.isArray(o.lineItems)?o.lineItems:[]).map(li=>({
    title: str(li&&li.title,200),
    quantity: num(li&&li.quantity,1),
    properties: (li&&li.properties&&typeof li.properties==="object")?li.properties:{}
  }));
  const miris = (o.miris&&typeof o.miris==="object")?o.miris:{};
  return {
    name: str(o.name,40),
    customerName: str(o.customerName,120),
    customerEmail: str(o.customerEmail,160),
    createdAt: tsMs(o.createdAt) || Date.now(),
    totalPrice: num(o.totalPrice,0),
    currency: str(o.currency||"EUR",8),
    financialStatus: str(o.financialStatus||"",40),
    fulfillmentStatus: str(o.fulfillmentStatus||"",40),
    lineItems, miris,
    adminUrl: str(o.adminUrl,400),
    isWiderruf: !!o.isWiderruf,
    autoPaidByBank: !!o.autoPaidByBank,
    cancelledAt: o.cancelledAt || null,
    shippingAddress: (o.shippingAddress && typeof o.shippingAddress==="object") ? o.shippingAddress : null,
    local, _sourceHash: str(o._sourceHash,64), updatedAt: tsMs(o.updatedAt)||Date.now()
  };
}
function sanitizeAnliegen(a){
  if(!a || typeof a!=="object") return null;
  const id = a.id || hashId([a.date,a.subject||a.thema,a.customerEmail,a.nachricht].join("|"));
  const kind = ANLIEGEN_KINDS.includes(a.kind)?a.kind:"Sonstiges";
  let status = a.status==="offen" ? "neu" : a.status; // Alt-Status migrieren
  status = ANLIEGEN_STATI.includes(status)?status:"neu";
  return {
    id:String(id), date: tsMs(a.date)||Date.now(), kind,
    customerName: str(a.customerName,120), customerEmail: str(a.customerEmail,160),
    thema: str(a.thema,300), nachricht: str(a.nachricht,4000),
    relatedOrder: a.relatedOrder?str(a.relatedOrder,40):null,
    widerrufAdminUrl: a.widerrufAdminUrl?str(a.widerrufAdminUrl,400):null,
    status, localNotes: str(a.localNotes,2000), updatedAt: tsMs(a.updatedAt)||Date.now(),
    replies: Array.isArray(a.replies)?a.replies.slice(0,20):null,
    fromDb: !!a.fromDb
  };
}
function sanitizeGap(g){
  if(!g || typeof g!=="object") return null;
  const frage = str(g.frage,600).trim(); if(!frage) return null;
  const status = ["neu","geplant","eingebaut"].includes(g.status)?g.status:"neu";
  return {

}
function sanitizeImage(im){
  if(!im || typeof im!=="object" || !im.imageUrl) return null;
  const id = im.id || hashId((im.orderName||"")+"|"+im.imageUrl);
  return {
    id:String(id), orderName: str(im.orderName,40), imageUrl: str(im.imageUrl,600),
    cloudinaryPublicId: str(im.cloudinaryPublicId || cloudinaryPublicId(im.imageUrl),300),
    label: str(im.label,120),
    ageDays: num(im.ageDays,0),
    flaggedForDeletion: !!im.flaggedForDeletion, deletedAt: tsMs(im.deletedAt),
    notes: str(im.notes,600)
  };
}
function sanitizeDays(obj){
  const out={}; if(!obj||typeof obj!=="object"||Array.isArray(obj)) return out;
  Object.keys(obj).forEach(k=>{
    if(!/^\d{4}-\d{2}-\d{2}$/.test(k)||!Array.isArray(obj[k])) return;
    const list = obj[k].map(t=>{
      if(!t||typeof t!=="object"||!t.id) return null;
      const text = str(t.text,300).trim(); if(!text) return null;
      return { id:String(t.id), text, done:!!t.done, priority:Math.min(2,Math.max(0,num(t.priority,0))),
        linkedOrder:t.linkedOrder?str(t.linkedOrder,40):null, linkedAnliegen:t.linkedAnliegen?str(t.linkedAnliegen,64):null,
        createdAt:tsMs(t.createdAt)||Date.now() };
    }).filter(Boolean);
    if(list.length) out[k]=list;
  });
  return out;
}

function loadState(){
  const meta = Store.get(K.meta,{schemaVersion:SCHEMA_VERSION});
  if(meta.schemaVersion < SCHEMA_VERSION){ /* Migrations-Gerüst */ }
  Store.set(K.meta,{schemaVersion:SCHEMA_VERSION});
  state.settings = Object.assign({},DEFAULT_SETTINGS,Store.get(K.settings,{}));
  state.settings.mahnungDays = Math.max(1,num(state.settings.mahnungDays,7));
  state.orders = mapSanitize(Store.get(K.orders,{}), sanitizeOrder, "name");
  state.anliegen = mapSanitize(Store.get(K.anliegen,{}), sanitizeAnliegen, "id");
  state.gaps = mapSanitize(Store.get(K.gaps,{}), sanitizeGap, "id");
  state.images = mapSanitize(Store.get(K.images,{}), sanitizeImage, "id");
  state.days = sanitizeDays(Store.get(K.days,{}));
  state.importlog = Store.get(K.importlog,{}) || {};
  const dm = Store.get(K.dismissed,{}); state.dismissed = (dm && typeof dm==="object" && !Array.isArray(dm)) ? dm : {};
  const sm = Store.get(K.sentMails,{}); state.sentMails = (sm && typeof sm==="object" && !Array.isArray(sm)) ? sm : {};
  const brv = Store.get(K.bankReview,[]); state.bankReview = Array.isArray(brv) ? brv : [];
  const syd = Store.get(K.systemData,null); state.systemData = (syd && typeof syd==="object") ? syd : null;
  // Speicher-Hygiene: Altlasten automatisch ausmisten
  try{
    const now=Date.now(); let prunedI=0, prunedD=0;
    Object.keys(state.images).forEach(id=>{ const im=state.images[id]; if(im.deletedAt && now-im.deletedAt>30*86400000){ delete state.images[id]; prunedI++; } });
    Object.keys(state.dismissed).forEach(id=>{ if(now-state.dismissed[id]>180*86400000){ delete state.dismissed[id]; prunedD++; } });
    if(prunedI) persist(["images"]); if(prunedD) persist(["dismissed"]);
  }catch(e){}
  state.ui.ordersView = state.settings.kanbanMode ? "kanban" : "liste";
}
function mapSanitize(raw, fn, keyField){
  const out={}; if(!raw||typeof raw!=="object") return out;
  const vals = Array.isArray(raw)?raw:Object.values(raw);
  vals.forEach(v=>{ const s=fn(v); if(s) out[s[keyField]]=s; });
  return out;
}
let saveTimer=null; const pending=new Set();

try{ window.addEventListener("pagehide",flushSaves); document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="hidden") flushSaves(); }); }catch(e){}

/* ---------- Helfer ---------- */
function uid(){ return Date.now().toString(36)+"."+Math.random().toString(36).slice(2,8); }
function hashId(s){ let h=5381; s=String(s); for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; } return h.toString(36); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
// URLs aus importierten/Remote-Daten dürfen NUR http(s) sein (kein javascript: etc. in href/src).
function safeUrl(u){ const s=String(u==null?"":u).trim(); return /^https?:\/\//i.test(s) ? esc(s) : ""; }
function el(html){ const t=document.createElement("template"); t.innerHTML=String(html).trim(); return t.content.firstElementChild; }
function todayStr(d){ try{ return (d||new Date()).toLocaleDateString("sv"); }catch(e){ const x=d||new Date(); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); } }
function fmtDate(ts){ if(!ts) return "—"; try{ return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}); }catch(e){ return ""; } }
function fmtDateTime(ts){ if(!ts) return "—"; try{ return new Date(ts).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function fmtMoney(n,cur){ try{ return new Intl.NumberFormat("de-DE",{style:"currency",currency:cur||"EUR"}).format(num(n,0)); }catch(e){ return num(n,0).toFixed(2)+" €"; } }
function ageDays(ts,now){ return ((now||Date.now())-ts)/86400000; }
function normStr(s){ return String(s==null?"":s).toLowerCase().trim(); }
function cloudinaryPublicId(url){
  const m = String(url||"").match(/\/upload\/(?:v\d+\/)?(.+?)(?:\.[a-z0-9]+)?(?:\?.*)?$/i);
  return m ? m[1] : "";
}
function isCloudinary(url){ return /res\.cloudinary\.com/.test(String(url||"")); }
function prettyToken(s){ return String(s||"").replace(/_/g," "); }

/* ---------- Toast / Modal ---------- */
function toast(msg,ms){ const root=document.getElementById("toast-root"); if(!root) return; const t=el('<div class="toast"></div>'); t.textContent=msg; root.appendChild(t); setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; },(ms||2600)-300); setTimeout(()=>t.remove(),ms||2600); }
function showModal(inner,opts){ const root=document.getElementById("modal-root"); root.innerHTML='<div class="modal" role="dialog"></div>'; root.firstElementChild.innerHTML=inner; root.classList.add("open"); root.onclick=(e)=>{ if(e.target===root && !(opts&&opts.sticky)) closeModal(); }; document.body.classList.add("no-scroll"); return root.firstElementChild; }
function closeModal(){ const root=document.getElementById("modal-root"); root.classList.remove("open"); root.innerHTML=""; root.onclick=null; document.body.classList.remove("no-scroll"); }
function confirmDialog(title,text,okLabel,danger){ return new Promise(res=>{ const m=showModal('<h2>'+esc(title)+'</h2><p class="muted" style="line-height:1.6">'+esc(text)+'</p><div class="modal-btns"><button class="btn btn-ghost" data-x="no">Abbrechen</button><button class="btn '+(danger?"btn-danger":"btn-primary")+'" data-x="yes">'+esc(okLabel||"OK")+'</button></div>'); m.querySelector('[data-x=no]').onclick=()=>{closeModal();res(false);}; m.querySelector('[data-x=yes]').onclick=()=>{closeModal();res(true);}; }); }
function promptModal(title,label,val,multiline){ return new Promise(res=>{ const inp = multiline?'<textarea id="pm-in">'+esc(val||"")+'</textarea>':'<input type="text" id="pm-in" value="'+esc(val||"")+'">'; const m=showModal('<h2>'+esc(title)+'</h2><label class="field"><span>'+esc(label||"")+'</span>'+inp+'</label><div class="modal-btns"><button class="btn btn-ghost" data-x="no">Abbrechen</button><button class="btn btn-primary" data-x="yes">Speichern</button></div>'); const input=m.querySelector("#pm-in"); input.focus(); m.querySelector('[data-x=no]').onclick=()=>{closeModal();res(null);}; m.querySelector('[data-x=yes]').onclick=()=>{const v=input.value;closeModal();res(v);}; }); }

/* ======================================================================
   Kategorisierungs-Engine (reine Funktion) — verifiziert an Live-Orders
   ====================================================================== */
function categorize(o, settings, now){
  now = now||Date.now();
  const L=o.local||{}, m=o.miris||{};
  const fin=normStr(o.financialStatus), ful=normStr(o.fulfillmentStatus);
  const appr=normStr(m.approval_status), dec=normStr(m.customer_decision);
  const titles=(o.lineItems||[]).map(li=>li.title).join(" ");
  const isRepair = !!m.repair_status || /reparatur/i.test(titles);
  const badges=[];
  if(o.autoPaidByBank) badges.push({t:"Auto-bezahlt (Bank)",k:"ok"});
  if(o.isWiderruf) badges.push({t:"Widerruf",k:"warn"});
  if(fin==="voided") badges.push({t:"Storniert",k:"muted"});
  if(fin==="refunded"||fin==="partially_refunded") badges.push({t:"Erstattet",k:"muted"});
  if(fin==="partially_paid") badges.push({t:"Teilzahlung",k:"warn"});
  if(m.repair_status) badges.push({t:"Reparatur: "+prettyToken(m.repair_status),k:"info"});
  if(num(m.revision_count,0)>0) badges.push({t:"Revision ×"+num(m.revision_count,0),k:"info"});
  if(L.mahnungSentAt) badges.push({t:"Mahnung "+fmtDate(L.mahnungSentAt),k:"muted"});

  if(L.done) return {primary:"Erledigt",badges};
  if(L.manualCategory) return {primary:L.manualCategory,badges};

  const unpaid = ["pending","authorized","partially_paid"].includes(fin);
  if(unpaid){
    const overdue = ageDays(o.createdAt,now) >= (settings.mahnungDays||7) && !L.mahnungSentAt;
    return {primary: overdue?"Mahnung fällig":"Zahlung offen", badges};
  }
  if(fin==="voided"||fin==="refunded"||fin==="partially_refunded"){
    return {primary: ful==="fulfilled"?"Versendet":"Erledigt", badges};
  }
  // ab hier: bezahlt (inkl. 0 €)
  if(ful==="fulfilled" || L.shippedMarkedAt) return {primary:"Versendet",badges};
  if(isRepair) return {primary:"Reparatur",badges};
  // Set-Bestellung, bezahlt, unfulfilled → Farbvorschau-Lebenszyklus
  const approved = dec.indexOf("freigegeben")>=0 || appr==="versandbereit" || appr==="freigegeben";
  if(approved) return {primary:"Freigegeben – muss versendet werden",badges};
  const revision = appr.indexOf("revision")>=0 || appr.indexOf("überarbeit")>=0 || dec.indexOf("revision")>=0 || dec.indexOf("änderung")>=0;
  if(revision){ badges.push({t:"Überarbeitung",k:"warn"}); return {primary:"Farbvorschau offen",badges}; }
  // Vorschau existiert/wurde gesendet → wartet auf Freigabe (unabhängig vom approval_status-Wortlaut)
  const sent = !!(m.preview_url||m.approval_url||m.preview_sent_at||L.previewSentAt);
  if(sent) return {primary:"Vorschau gesendet – wartet auf Freigabe",badges};
  return {primary:"Farbvorschau offen",badges};
}
function ordersByCategory(now){
  const buckets={}; CATS.forEach(c=>buckets[c]=[]);
  Object.values(state.orders).forEach(o=>{ const {primary}=categorize(o,state.settings,now); (buckets[primary]||(buckets[primary]=[])).push(o); });
  return buckets;
}

/* ---------- Umsatz / KPIs ---------- */
function revenue(now){
  now=now||Date.now();
  const startOfDay=new Date(now); startOfDay.setHours(0,0,0,0);
  const weekAgo=now-7*86400000, monthStart=new Date(now); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  let heute=0,woche=0,monat=0,gesamt=0,paidCount=0;
  Object.values(state.orders).forEach(o=>{
    if(normStr(o.financialStatus)!=="paid") return;
    const amt=num(o.totalPrice,0); gesamt+=amt; paidCount++;
    if(o.createdAt>=startOfDay.getTime()) heute+=amt;
    if(o.createdAt>=weekAgo) woche+=amt;
    if(o.createdAt>=monthStart.getTime()) monat+=amt;
  });
  return {heute,woche,monat,gesamt,paidCount};
}
function openAnliegenCount(){ return Object.values(state.anliegen).filter(a=>a.status!=="erledigt").length; }
function openImagesCount(){ return Object.values(state.images).filter(im=>im.flaggedForDeletion && !im.deletedAt).length; }
function openGapsCount(){ return Object.values(state.gaps).filter(g=>g.status!=="eingebaut").length; }
function todaysTasks(){ return (state.days[todayStr()]||[]); }

/* ======================================================================
   Daten-Provider: Import (JSON/CSV/E-Mail) + Live (Admin-Dienst)
   ====================================================================== */
function orderSourceHash(o){ // hash über Remote-Felder (ohne local{})
  return hashId(JSON.stringify({n:o.name,c:o.createdAt,t:o.totalPrice,f:o.financialStatus,fu:o.fulfillmentStatus,m:o.miris,li:o.lineItems,w:o.isWiderruf,sa:o.shippingAddress,ca:o.cancelledAt,e:o.customerEmail,ab:o.autoPaidByBank}));
}
function mergeOrders(incoming){
  let added=0,updated=0;
  incoming.forEach(raw=>{
    const inc=sanitizeOrder(raw); if(!inc) return;
    const hash=orderSourceHash(inc); inc._sourceHash=hash;
    const ex=state.orders[inc.name];
    if(!ex){ inc.local=DEFAULT_LOCAL();
      // internal_note → local.notes (nur wenn leer)
      if(inc.miris && inc.miris.internal_note) inc.local.notes=str(inc.miris.internal_note,2000);
      state.orders[inc.name]=inc; added++;
    } else if(ex._sourceHash!==hash){
      const keepLocal=ex.local;
      inc.local=keepLocal; inc.updatedAt=Date.now();
      if((!keepLocal.notes||!keepLocal.notes.trim()) && inc.miris && inc.miris.internal_note) inc.local.notes=str(inc.miris.internal_note,2000);
      state.orders[inc.name]=inc; updated++;
    }
  });
  if(added||updated) saveOrders();
  return {added,updated};
}
function mergeAnliegen(incoming){
  let added=0,updated=0;
  incoming.forEach(raw=>{
    const inc=sanitizeAnliegen(raw); if(!inc) return;
    if(state.dismissed[inc.id]) return;   // im Cockpit gelöscht → nicht zurückholen
    const ex=state.anliegen[inc.id];
    if(!ex){ state.anliegen[inc.id]=inc; added++; }
    else { // Remote-Felder auffrischen, Status/Notizen behalten
      inc.status=ex.status; inc.localNotes=ex.localNotes; state.anliegen[inc.id]=inc; updated++;
    }
    if(inc.kind==="Widerruf" && inc.relatedOrder && state.orders[inc.relatedOrder]){ state.orders[inc.relatedOrder].isWiderruf=true; saveOrders(); }
  });
  if(added||updated) saveAnliegen();
  return {added,updated};
}
function mergeImages(incoming){
  let added=0,updated=0;
  incoming.forEach(raw=>{
    const inc=sanitizeImage(raw); if(!inc) return;
    const ex=state.images[inc.id];
    if(!ex){ state.images[inc.id]=inc; added++; }
    else { inc.flaggedForDeletion=ex.flaggedForDeletion; inc.deletedAt=ex.deletedAt; inc.notes=ex.notes; state.images[inc.id]=inc; updated++; }
  });
  if(added||updated) saveImages();
  return {added,updated};
}
function mergeGaps(incoming){
  let added=0;
  const norm=(s)=>normStr(s).replace(/\s+/g," ").replace(/[?.!,]+$/,"");
  const existing=Object.values(state.gaps);
  incoming.forEach(raw=>{
    const inc=sanitizeGap(raw); if(!inc) return;
    const dup=existing.find(g=>norm(g.frage)===norm(inc.frage));
    if(dup){ dup.haeufigkeit=Math.max(dup.haeufigkeit,inc.haeufigkeit); if(!dup.vorgeschlagene_antwort && inc.vorgeschlagene_antwort) dup.vorgeschlagene_antwort=inc.vorgeschlagene_antwort; }
    else { state.gaps[inc.id]=inc; existing.push(inc); added++; }
  });
  if(added) saveGaps();
  return {added};
}
// Bilder aus Bestell-Line-Items ableiten (Auge N Bild)
function deriveImagesFromOrders(){
  const now=Date.now(); const out=[];
  Object.values(state.orders).forEach(o=>{
    (o.lineItems||[]).forEach(li=>{
      Object.keys(li.properties||{}).forEach(key=>{
        const val=li.properties[key];
        if(/^Auge\s*\d+\s*Bild$/i.test(key) && val && isCloudinary(val)){
          out.push({ orderName:o.name, imageUrl:val, label:key, ageDays:Math.round(ageDays(o.createdAt,now)) });
        }
      });
    });
  });
  return out;
}

/* ---------- Snapshot / CSV / E-Mail Parser ---------- */
function importSnapshot(json){
  let data; try{ data=(typeof json==="string")?JSON.parse(json):json; }catch(e){ throw new Error("Ungültiges JSON."); }
  if(!data || typeof data!=="object") throw new Error("Leeres Snapshot.");
  if(data.snapshotVersion && num(data.snapshotVersion,1)!==1) throw new Error("Unbekannte Snapshot-Version.");
  const ro = Array.isArray(data.orders)?mergeOrders(data.orders):{added:0,updated:0};
  const ra = Array.isArray(data.anliegen)?mergeAnliegen(data.anliegen):{added:0,updated:0};
  let ri={added:0,updated:0};
  if(Array.isArray(data.images) && data.images.length) ri=mergeImages(data.images);
  // zusätzlich Bilder aus Orders ableiten
  const derived=deriveImagesFromOrders(); if(derived.length){ const r2=mergeImages(derived); ri.added+=r2.added; }
  state.importlog.lastSnapshotAt=Date.now();
  state.importlog.generatedAt=tsMs(data.generatedAt)||null;
  saveImportlog();
  return {orders:ro, anliegen:ra, images:ri};
}
function parseCSV(text){
  // simpler robuster CSV-Reader (Anführungszeichen + Zeilenumbrüche)
  const rows=[]; let row=[], field="", i=0, q=false;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===","){ row.push(field); field=""; } else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; } else if(c==="\r"){} else field+=c; }
    i++;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.length>1);
}
function importCSV(text){
  const rows=parseCSV(text); if(rows.length<2) throw new Error("CSV enthält keine Datenzeilen.");
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=(names)=>{ for(const n of names){ const p=head.indexOf(n); if(p>=0) return p; } return -1; };
  const iName=idx(["name"]), iFin=idx(["financial status","zahlungsstatus"]), iFul=idx(["fulfillment status","fulfillment-status"]),
    iTot=idx(["total","gesamt"]), iCreated=idx(["created at","erstellt am"]), iEmail=idx(["email","e-mail"]), iCust=idx(["billing name","customer name","name (billing)"]);
  if(iName<0) throw new Error("Spalte 'Name' nicht gefunden.");
  const byName={};
  for(let r=1;r<rows.length;r++){ const row=rows[r]; const name=(row[iName]||"").trim(); if(!name) continue;
    if(!byName[name]){ byName[name]={ name, customerName:iCust>=0?row[iCust]:"", customerEmail:iEmail>=0?row[iEmail]:"",
      createdAt:iCreated>=0?row[iCreated]:null, totalPrice:iTot>=0?parseFloat(String(row[iTot]).replace(/\.(?=\d{3}(\D|$))/g,"").replace(",","."))||0:0,
      currency:"EUR", financialStatus:iFin>=0?row[iFin]:"", fulfillmentStatus:iFul>=0?row[iFul]:"", lineItems:[], miris:{} }; }
  }
  return mergeOrders(Object.values(byName));
}
function parseEmail(raw){
  const text=String(raw||""); const low=text.toLowerCase();
  let kind="Sonstiges", customerName="", customerEmail="", thema="", nachricht="", relatedOrder=null, widerrufAdminUrl=null;
  const orderMatch=text.match(/B\d{3,6}/); if(orderMatch) relatedOrder=orderMatch[0];
  const emailMatch=text.match(/[\w.+-]+@[\w-]+\.[\w.-]+/); if(emailMatch) customerEmail=emailMatch[0];
  const grab=(label)=>{ const re=new RegExp(label+"\\s*[:\\n]\\s*(.+)","i"); const m=text.match(re); return m?m[1].trim():""; };
  if(/widerruf/i.test(low)){ kind="Widerruf"; customerName=grab("Name")||grab("nachname"); const w=text.match(/https?:\/\/\S*withdrawals?\/\S+/i); if(w) widerrufAdminUrl=w[0]; nachricht=grab("Weitere Informationen")||text.slice(0,500); thema="Widerruf "+(relatedOrder||""); }
  else if(/adressänderung|adressaenderung/i.test(low)){ kind="Adressänderung"; }
  else if(/feedback/i.test(low)){ kind="Feedback"; }
  else if(/chat-nachricht|iris-chat|ki chat|chat/i.test(low)){ kind="Chat-Nachricht"; }
  if(kind!=="Widerruf"){
    customerName=customerName||grab("Name");
    thema=grab("Thema")|| (kind==="Adressänderung"?("Adressänderung "+(relatedOrder||"")):"") ;
    nachricht=grab("Nachricht")|| text.slice(0,800);
  }
  return { date:Date.now(), kind, customerName, customerEmail, thema:thema||kind, nachricht, relatedOrder, widerrufAdminUrl };
}

/* ---------- Live-Provider (Admin-Dienst, Phase 2/3) ---------- */
function liveConfigured(){ return !!(state.settings.backendUrl && state.settings.adminToken); }
async function liveFetch(path, opts){
  const base=state.settings.backendUrl.replace(/\/$/,"");
  const res=await fetch(base+path, Object.assign({ headers:{ "Authorization":"Bearer "+state.settings.adminToken, "content-type":"application/json" } }, opts||{}));
  if(!res.ok){ let m=""; try{ const j=await res.json(); m=j.error||j.message||""; }catch(e){} throw new Error("Backend "+res.status+(m?": "+m:"")); }
  return res.json();
}
async function liveSyncAll(){
  if(!liveConfigured()) throw new Error("Kein Backend hinterlegt – bitte in den Einstellungen eintragen.");
  const out={orders:{added:0,updated:0},anliegen:{added:0,updated:0},images:{added:0,updated:0}};
  const od=await liveFetch("/admin/orders"); if(od&&Array.isArray(od.orders)) out.orders=mergeOrders(od.orders);
  try{
    const an=await liveFetch("/admin/anliegen");
    if(an&&Array.isArray(an.anliegen)){
      if(an.source==="db"){
        // DB ist die Wahrheitsquelle (Status/Löschungen serverseitig) → Liste ersetzen,
        // nur lokale Notizen behalten.
        const next={};
        an.anliegen.forEach(raw=>{ const s=sanitizeAnliegen(Object.assign({fromDb:true},raw)); if(!s) return;
          const ex=state.anliegen[s.id]; if(ex&&ex.localNotes) s.localNotes=ex.localNotes; next[s.id]=s; });
        out.anliegen={added:Math.max(0,Object.keys(next).length-Object.keys(state.anliegen).length),updated:0};
        state.anliegen=next; saveAnliegen();
      } else {
        out.anliegen=mergeAnliegen(an.anliegen);
      }
    }
  }catch(e){}
  try{ const im=await liveFetch("/admin/images"); if(im&&Array.isArray(im.images)) out.images=mergeImages(im.images); }catch(e){}
  // Bank-Zahlungsabgleich: Review-Liste + Status (Server ist die Wahrheit). Fehler hier
  // dürfen den Haupt-Sync nie brechen.
  try{ const bv=await liveFetch("/admin/bank/review"); if(bv&&Array.isArray(bv.review)){ state.bankReview=bv.review; saveBankReview(); } }catch(e){}
  try{ const bs=await liveFetch("/admin/bank/status"); if(bs) state.bankStatus=bs; }catch(e){}
  const derived=deriveImagesFromOrders(); if(derived.length) mergeImages(derived);
  state.importlog.lastLiveAt=Date.now(); saveImportlog();
  return out;
}

/* Zahlungseingang prüfen: Bestellung wählen und als bezahlt bestätigen. */
function openBankResolve(bt){
  // Kandidaten aus offenen Bestellungen mit exakt gleichem Betrag (Hilfestellung)
  const cands=Object.values(state.orders).filter(o=>["pending","authorized","partially_paid"].includes(normStr(o.financialStatus)) && !o.cancelledAt && Math.round(num(o.totalPrice)*100)===Math.round(num(bt.amount)*100));
  const chipHtml=cands.slice(0,8).map(o=>'<button type="button" class="btn btn-sm btn-ghost bcand" data-o="'+esc(o.name)+'">'+esc(o.name)+' · '+esc(o.customerName||"")+'</button>').join(" ");
  const m=showModal('<h2>Zahlungseingang</h2>'+
    '<div class="kv"><div class="k">Betrag</div><div class="v"><b>'+esc(fmtMoney(bt.amount,bt.currency))+'</b></div></div>'+
    '<div class="kv"><div class="k">Überweiser</div><div class="v">'+esc(bt.payerName||"—")+'</div></div>'+
    '<div class="kv"><div class="k">Verwendung</div><div class="v">'+esc(bt.remittanceExcerpt||"—")+'</div></div>'+
    '<label class="field" style="margin-top:10px"><span>Als bezahlt markieren – Bestellnummer</span><input type="text" id="br-order" value="'+esc(bt.orderName||"")+'" placeholder="B1234"></label>'+
    (chipHtml?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">'+chipHtml+'</div>':'<p class="tiny muted">Keine offene Bestellung mit exakt diesem Betrag gefunden – Nummer manuell eintragen.</p>')+
    '<div class="modal-btns"><button class="btn btn-ghost" data-x="no">Abbrechen</button><button class="btn btn-primary" data-x="go">Bezahlt bestätigen</button></div>',{sticky:true});
  m.querySelectorAll(".bcand").forEach(b=>b.onclick=()=>{ m.querySelector("#br-order").value=b.getAttribute("data-o"); });
  m.querySelector('[data-x=no]').onclick=closeModal;
  const go=m.querySelector('[data-x=go]');
  go.onclick=async()=>{
    const orderName=m.querySelector("#br-order").value.trim().toUpperCase();
    if(!/^B\d{3,6}$/.test(orderName)){ toast("Gültige Bestellnummer (z. B. B1234) eintragen"); return; }
    go.disabled=true; go.innerHTML='<span class="spin"></span> Buche…';
    try{
      await liveFetch("/admin/bank/review/"+encodeURIComponent(bt.dedupKey)+"/resolve",{method:"POST",body:JSON.stringify({status:"confirmed",orderName})});
      state.bankReview=(state.bankReview||[]).filter(x=>x.dedupKey!==bt.dedupKey); saveBankReview();
      closeModal(); toast(orderName+" als bezahlt markiert ✓");
      try{ await liveSyncAll(); }catch(e){} render();
    }catch(e){ go.disabled=false; go.textContent="Bezahlt bestätigen"; toast(e.message,6000); }
  };
}

  let searchT=null;
  search.addEventListener("input",()=>{ clearTimeout(searchT); searchT=setTimeout(()=>{ state.ui.ordersQuery=search.value; render(); const s2=document.querySelector('#app input[placeholder="Suchen…"]'); if(s2){ s2.focus(); s2.setSelectionRange(s2.value.length,s2.value.length); } },300); });

      it.onclick=()=>nav("#/bestellung/"+encodeURIComponent(o.name));

function orderCard(o,now){
  const {primary,badges}=categorize(o,state.settings,now);
  const c=el('<div class="ocard"></div>');
  const perso=personalizationSummary(o);
  c.innerHTML='<div class="o-top"><span class="o-name">'+esc(o.name)+'</span><span class="o-total">'+esc(fmtMoney(o.totalPrice,o.currency))+'</span></div>'+
    '<div class="o-cust">'+esc(o.customerName||o.customerEmail||"—")+'</div>'+
    '<div class="o-meta">'+esc(fmtDate(o.createdAt))+(perso?' · '+esc(perso):"")+'</div>'+
    (badges.length?'<div class="o-badges">'+badges.map(b=>'<span class="badge '+b.k+'">'+esc(b.t)+'</span>').join("")+'</div>':"");
  c.onclick=()=>nav("#/bestellung/"+encodeURIComponent(o.name));
  return c;

function personalizationSummary(o){
  const li=(o.lineItems||[])[0]; if(!li) return "";
  const p=li.properties||{}; const parts=[];
  Object.keys(p).forEach(k=>{ if(/Augenfarbe.*Beschreibung/i.test(k)&&p[k]) parts.push(p[k]); });
  Object.keys(p).forEach(k=>{ if(/^Buchstabe/i.test(k)&&p[k]&&!/Kein/i.test(k)) parts.push("Buchst. "+p[k]); });
  return parts.slice(0,3).join(", ");
}

    const upB=el('<button class="btn btn-sm '+(m.preview_url?"btn-ghost":"btn-primary")+'" style="margin-top:10px">'+(m.preview_url?"Neue Version hochladen & senden":"Foto wählen & senden")+'</button>');

function openFulfillModal(o){

    '<h2>Versendet markieren – '+esc(o.name)+'</h2>'+
    
    '<label class="field" style="margin-top:12px"><span>Sendungsnummer (optional)</span><input type="text" id="ff-nr" placeholder="z. B. 00340434…"></label>'+

  );

  const go=m.querySelector('[data-x=go]');

    const nr=m.querySelector("#ff-nr").value.trim();
    const co=m.querySelector("#ff-co").value;

      o.local.shippedMarkedAt=Date.now(); saveOrders();
      closeModal(); toast("Versendet ✓ – Kunde wird benachrichtigt");
      try{ await liveSyncAll(); }catch(e){} render();
    }catch(e){ go.disabled=false; go.textContent="Versenden"; toast(e.message,5000); }

function viewAnliegen(app){
  const wrap=el('<div></div>'); wrap.innerHTML=pageHead("Anliegen-Inbox","Kundenanfragen aus dem KI-Chat & Widerrufe – hier abhaken.");
  const list=Object.values(state.anliegen).sort((a,b)=>b.date-a.date);
  // filter
  const ctl=el('<div class="row" style="margin-bottom:12px"></div>');
  const f=state.ui.anliegenFilter;
  const fSel=el('<select style="max-width:220px"><option value="alle">Alle ('+list.length+')</option><option value="offen">Offen</option><option value="in Arbeit">In Arbeit</option><option value="erledigt">Erledigt</option>'+ANLIEGEN_KINDS.map(k=>'<option value="kind:'+esc(k)+'">'+esc(k)+'</option>').join("")+'</select>');
  fSel.value=f; ctl.appendChild(fSel); ctl.appendChild(el('<span class="spacer"></span>'));
  const addBtn=el('<button class="btn btn-sm btn-ghost">+ Manuell / E-Mail einfügen</button>'); addBtn.onclick=openEmailPaste; ctl.appendChild(addBtn);
  wrap.appendChild(ctl);
  fSel.onchange=()=>{ state.ui.anliegenFilter=fSel.value; render(); };

  let shown=list;
  if(f==="offen"||f==="in Arbeit"||f==="erledigt") shown=list.filter(a=>a.status===f);
  else if(f.startsWith("kind:")) shown=list.filter(a=>a.kind===f.slice(5));

  if(!shown.length){ wrap.appendChild(emptyBlock("Keine Anliegen","","",null,openEmailPaste,"E-Mail einfügen")); app.appendChild(wrap); return; }

  shown.forEach(a=>{
    const kindK={"Widerruf":"warn","Feedback":"info","Adressänderung":"info","DSGVO":"danger","Reparatur":"info","Chat-Nachricht":"muted","Sonstiges":"muted"}[a.kind]||"muted";
    const done=a.status==="erledigt";
    const statusK={"neu":"warn","in Arbeit":"info","beantwortet":"ok","erledigt":"muted"}[a.status]||"muted";
    const it=el('<div class="card" style="padding:14px"></div>');
    it.innerHTML='<div class="row" style="align-items:flex-start"><div style="flex:1;min-width:0">'+
      '<div class="row" style="gap:6px"><span class="badge '+kindK+'">'+esc(a.kind)+'</span>'+(a.relatedOrder?'<span class="badge">'+esc(a.relatedOrder)+'</span>':"")+'<span class="badge '+statusK+'">'+esc(a.status)+'</span></div>'+
      '<div style="font-weight:700;margin-top:8px">'+esc(a.thema||"—")+'</div>'+
      '<div class="small" style="margin-top:4px;white-space:pre-wrap">'+esc(a.nachricht||"")+'</div>'+
      (Array.isArray(a.replies)&&a.replies.length?'<div class="small" style="margin-top:8px;padding:8px;background:var(--ok-bg)"><b>Deine Antwort:</b> '+esc(a.replies[a.replies.length-1].text||"")+'</div>':"")+
      '<div class="tiny muted" style="margin-top:8px">'+(a.customerEmail?kundeLink(a.customerEmail,a.customerName||a.customerEmail):esc(a.customerName||""))+' · '+esc(fmtDateTime(a.date))+'</div>'+
      '</div></div>';
    const acts=el('<div class="row" style="margin-top:12px;gap:8px"></div>');
    if(a.customerEmail && liveConfigured() && a.fromDb){
      const rb=el('<button class="btn btn-sm btn-primary">Antworten</button>'); rb.onclick=()=>openReplyModal(a); acts.appendChild(rb);
    } else if(a.customerEmail){
      acts.appendChild(el('<a class="btn btn-sm btn-ghost" href="mailto:'+esc(a.customerEmail)+'?subject='+encodeURIComponent("Deine Anfrage an M.IRIS")+'">Antworten</a>'));
    }
    if(a.customerEmail||a.customerName){ const cb=el('<button class="btn btn-sm btn-ghost">Chats</button>'); cb.onclick=()=>{ state.ui.chatQuery=a.customerEmail||a.customerName; nav("#/chats"); }; acts.appendChild(cb); }
    if(a.widerrufAdminUrl) acts.appendChild(el('<a class="btn btn-sm btn-ghost" href="'+safeUrl(a.widerrufAdminUrl)+'" target="_blank" rel="noopener">Widerruf öffnen ↗</a>'));
    if(a.relatedOrder && state.orders[a.relatedOrder]) acts.appendChild(el('<a class="btn btn-sm btn-ghost" href="#/bestellung/'+encodeURIComponent(a.relatedOrder)+'">Bestellung</a>'));
    const taskB=el('<button class="btn btn-sm btn-ghost">+ Aufgabe</button>'); taskB.onclick=()=>addTaskFor({linkedAnliegen:a.id,text:(a.thema||a.kind)+(a.relatedOrder?" ("+a.relatedOrder+")":"")}); acts.appendChild(taskB);
    const statusB=el('<button class="btn btn-sm '+(done?"btn-ghost":"btn-primary")+'">'+(done?"Wieder öffnen":"Erledigt ✓")+'</button>');

    delB.onclick=()=>deleteAnliegen(a);
    acts.appendChild(el('<span class="spacer"></span>')); acts.appendChild(delB); acts.appendChild(statusB);
    it.appendChild(acts);
    wrap.appendChild(it);
  });
  app.appendChild(wrap);

function openReplyModal(a){
  const m=showModal(
    '<h2>Antwort an '+esc(a.customerName||a.customerEmail)+'</h2>'+
    '<p class="tiny muted">'+esc(a.thema||a.kind)+(a.relatedOrder?' · '+esc(a.relatedOrder):'')+' → '+esc(a.customerEmail)+'</p>'+
    '<div class="small" style="margin:10px 0;padding:8px;background:var(--surface2);max-height:100px;overflow-y:auto;white-space:pre-wrap">'+esc(a.nachricht||"")+'</div>'+
    '<label class="field"><span>Antwort</span><textarea id="rp-in" style="min-height:140px" placeholder="Nur der Mittelteil – Anrede & Gruß automatisch"></textarea></label>'+
    '<div class="modal-btns"><button class="btn btn-ghost" data-x="no">Abbrechen</button><button class="btn btn-primary" data-x="send">Senden</button></div>',
    {sticky:true}
  );
  m.querySelector('[data-x=no]').onclick=closeModal;
  const sendBtn=m.querySelector('[data-x=send]');
  sendBtn.onclick=async()=>{
    const text=m.querySelector("#rp-in").value.trim();
    if(text.length<2){ toast("Bitte eine Antwort schreiben"); return; }
    sendBtn.disabled=true; sendBtn.innerHTML='<span class="spin"></span> Sende…';
    try{
      const res=await liveFetch("/admin/anliegen/"+encodeURIComponent(a.id)+"/reply",{method:"POST",body:JSON.stringify({reply_text:text})});
      a.status="beantwortet"; a.replies=(a.replies||[]).concat([{text,at:new Date().toISOString()}]); saveAnliegen();
      closeModal(); toast("Antwort gesendet an "+(res.to||a.customerEmail)+" ✓"); render();

function chatMsgText(content){
  if(typeof content==="string") return content;
  if(Array.isArray(content)) return content.map(b=> typeof b==="string"?b:(b&&b.type==="text"?b.text:(b&&b.type==="tool_use"?"[Aktion: "+(b.name||"Tool")+"]":(b&&b.type==="tool_result"?"[Ergebnis entfernt]":"")))).filter(Boolean).join("\n");
  return "";
}
async function openChatViewer(c){
  const m=showModal('<h2>Chat mit '+esc(c.customerName||c.email||"Kunde")+'</h2><p class="tiny muted">'+esc(fmtDateTime(c.updatedAt))+(c.orderName?" · "+esc(c.orderName):"")+'</p><div id="cv-body" class="small" style="max-height:50dvh;overflow-y:auto;margin-top:10px"><p class="muted">Lade Verlauf…</p></div><div class="modal-btns"><button class="btn btn-danger" data-x="del">Löschen</button><button class="btn btn-ghost" data-x="no">Schließen</button></div>',{sticky:false});
  m.querySelector('[data-x=no]').onclick=closeModal;
  m.querySelector('[data-x=del]').onclick=async()=>{ closeModal(); deleteChatOne(c); };
  try{
    const res=await liveFetch("/admin/chats/"+encodeURIComponent(c.id));
    const msgs=(res.chat&&res.chat.messages)||[];
    const body=m.querySelector("#cv-body"); body.innerHTML="";
    if(!msgs.length){ body.innerHTML='<p class="muted">Kein Verlauf gespeichert.</p>'; return; }

    });

async function deleteChatOne(c){
  if(!await confirmDialog("Chat löschen?","Diesen Chat-Verlauf endgültig aus der Datenbank löschen?","Löschen",true)) return;

/* ======================================================================
   Kunden — Liste + Kundenakte (alles über einen Kunden auf einen Blick)
   ====================================================================== */
function normEmail(e){ return String(e||"").trim().toLowerCase(); }
function aggregateCustomers(){
  const map={};
  const touch=(email,name)=>{
    const key=normEmail(email); if(!key) return null;
    if(!map[key]) map[key]={ email:key, name:"", orders:[], anliegen:[], revenue:0, first:null, last:null };
    if(name && (!map[key].name || name.length>map[key].name.length)) map[key].name=name;
    return map[key];
  };
  Object.values(state.orders).forEach(o=>{
    const c=touch(o.customerEmail,o.customerName); if(!c) return;
    c.orders.push(o);
    if(normStr(o.financialStatus)==="paid") c.revenue+=num(o.totalPrice,0);
    c.first=c.first?Math.min(c.first,o.createdAt):o.createdAt;
    c.last=c.last?Math.max(c.last,o.createdAt):o.createdAt;
  });
  Object.values(state.anliegen).forEach(a=>{
    const c=touch(a.customerEmail,a.customerName); if(!c) return;
    c.anliegen.push(a);
    c.last=c.last?Math.max(c.last,a.date):a.date;
  });
  return map;
}
function kundeLink(email,name){
  const key=normEmail(email); if(!key) return esc(name||"—");
  return '<a href="#/kunde/'+encodeURIComponent(key)+'" style="text-decoration:underline">'+esc(name||key)+'</a>';
}

function openMailModal({email, firstName, orderName}){
  const presets=[
    { id:"frage", label:"Frage zur Bestellung", subject:"Frage zu deiner Bestellung"+(orderName?" "+orderName:"") },

function openPreviewUpload(o){
  const m=showModal('<h2>Farbvorschau senden – '+esc(o.name)+'</h2>'+
    
    '<input type="file" id="pv-file" accept="image/*" style="margin:12px 0">'+
    '<div id="pv-prev" style="display:none;margin-bottom:10px"><img id="pv-img" style="max-width:100%;max-height:220px;border:1px solid var(--line2)"></div>'+
    '<div class="modal-btns"><button class="btn btn-ghost" data-x="no">Abbrechen</button><button class="btn btn-primary" data-x="send" disabled>Hochladen & senden</button></div>',{sticky:true});
  m.querySelector('[data-x=no]').onclick=closeModal;
  const fileInput=m.querySelector("#pv-file"), send=m.querySelector('[data-x=send]');
  let payload=null;
  fileInput.onchange=()=>{
    const f=fileInput.files[0]; if(!f) return;
    if(!/^image\/(jpeg|jpg|png|webp)$/i.test(f.type)){ toast("Nur JPG, PNG oder WebP"); fileInput.value=""; return; }
    const img=new Image();
    const blobUrl=URL.createObjectURL(f);
    img.onload=()=>{
      // Client-Downscale: max 2500px, JPEG 0.85 → kleine Payload, schneller Versand
      const maxDim=2500; let w=img.width, h=img.height;
      if(Math.max(w,h)>maxDim){ const f2=maxDim/Math.max(w,h); w=Math.round(w*f2); h=Math.round(h*f2); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const dataUrl=cv.toDataURL("image/jpeg",0.85);
      payload={ imageBase64:dataUrl, mimeType:"image/jpeg" };
      m.querySelector("#pv-img").src=dataUrl;
      m.querySelector("#pv-prev").style.display="block";
      send.disabled=false;
      URL.revokeObjectURL(blobUrl);
    };
    img.onerror=()=>{ toast("Bild konnte nicht gelesen werden"); URL.revokeObjectURL(blobUrl); };
    img.src=blobUrl;
  };
  send.onclick=async()=>{
    if(!payload) return;
    send.disabled=true; send.innerHTML='<span class="spin"></span> Sende…';
    try{
      const r=await liveFetch("/admin/orders/"+encodeURIComponent(o.name)+"/send-preview",{method:"POST",body:JSON.stringify(payload)});
      o.local.previewSentAt=Date.now(); saveOrders();
      closeModal(); toast("Farbvorschau gesendet an "+(r.to||"Kunde")+" ✓ (Frist 24h)");
      try{ await liveSyncAll(); }catch(e){} render();
    }catch(e){ send.disabled=false; send.textContent="Hochladen & senden"; toast(e.message,6000); }
  };
}

  const eb=el('<button class="btn btn-sm btn-ghost" style="margin-top:8px">E-Mail-Text einfügen…</button>'); eb.onclick=openEmailPaste; eml.appendChild(eb);

async function doLiveSync(opts){
  if(!liveConfigured()){ nav("#/einstellungen"); return; }
  if(state.ui.syncing) return;
  const silent=opts&&opts.silent;
  state.ui.syncing=true; renderChrome(parseRoute().name);
  if(!silent) toast("Synchronisiere…",6000);
  try{ const r=await liveSyncAll(); if(!silent) toast("Live: "+r.orders.added+" neu, "+r.orders.updated+" aktualisiert"); }
  catch(e){ if(!silent) toast(e.message||"Sync fehlgeschlagen",5000); }
  finally{ state.ui.syncing=false; render(); }
}

/* ---------- Globale Suche (Bestellungen + Anliegen + Chats) ---------- */
function openGlobalSearch(){
  const m=showModal('<h2 style="font-size:15px">Suche</h2><label class="field" style="margin-top:8px"><input type="text" id="gs-in" placeholder="Bestellnr., Name, E-Mail, Thema…" autocomplete="off"></label><div id="gs-res" class="small"></div><div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">Schließen</button></div>');
  const inp=m.querySelector("#gs-in"), res=m.querySelector("#gs-res");
  let t=null;
  const row=(ico,title,sub,hash)=>{ const r=el('<a href="'+hash+'" style="display:flex;gap:10px;align-items:center;padding:10px 6px;border-bottom:1px solid var(--line);text-decoration:none"><span>'+ico+'</span><span style="flex:1;min-width:0"><b>'+esc(title)+'</b><br><span class="tiny muted">'+esc(sub)+'</span></span></a>'); r.onclick=()=>closeModal(); return r; };
  const run=async()=>{
    const q=normStr(inp.value); res.innerHTML="";
    if(q.length<2) return;
    const frag=document.createDocumentFragment();
    Object.values(state.orders).filter(o=>normStr(o.name+" "+o.customerName+" "+o.customerEmail).includes(q)).slice(0,6)
      .forEach(o=>frag.appendChild(row("▦",o.name+" · "+fmtMoney(o.totalPrice,o.currency),(o.customerName||o.customerEmail||"")+" · "+categorize(o,state.settings,Date.now()).primary,"#/bestellung/"+encodeURIComponent(o.name))));
    Object.values(state.anliegen).filter(a=>normStr((a.thema||"")+" "+(a.nachricht||"")+" "+(a.customerName||"")+" "+(a.customerEmail||"")+" "+(a.relatedOrder||"")).includes(q)).slice(0,6)
      .forEach(a=>frag.appendChild(row("✉",a.thema||a.kind,(a.customerName||"")+" · "+a.status,"#/anliegen")));
    Object.values(aggregateCustomers()).filter(c=>normStr(c.name+" "+c.email).includes(q)).slice(0,4)
      .forEach(c=>frag.appendChild(row("◎",c.name||c.email,c.orders.length+" Bestellungen · "+fmtMoney(c.revenue),"#/kunde/"+encodeURIComponent(c.email))));
    res.appendChild(frag);
    if(liveConfigured()){
      try{
        const r2=await liveFetch("/admin/chats?q="+encodeURIComponent(inp.value.trim())+"&limit=5");
        (r2.chats||[]).forEach(c=>{ const rr=row("❋","Chat: "+(c.customerName||c.email||"(ohne Name)"),(c.email||"")+" · "+fmtDate(c.updatedAt),"#/chats"); rr.onclick=()=>{ state.ui.chatQuery=inp.value.trim(); state.ui.chatResults=null; closeModal(); nav("#/chats"); }; res.appendChild(rr); });
      }catch(e){}
    }
    if(!res.children.length) res.innerHTML='<p class="muted" style="padding:10px 6px">Keine Treffer.</p>';
  };
  inp.addEventListener("input",()=>{ clearTimeout(t); t=setTimeout(run,250); });
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ clearTimeout(t); run(); } });
  inp.focus();
}

function defaultSystemData(){
  return {
    v:2,
    abos:[], // eigene Fixkosten – der Nutzer legt sie selbst per „+ Fixkosten" an (Name · Betrag · monatlich/jährlich)
    calc:{ preis:49.99, material:0, verpackung:0, versand:0, gebuehrPct:2.5, bestellungen:30 },
  };
}
function systemState(){
  if(!state.systemData || !Array.isArray(state.systemData.abos) || !state.systemData.calc){ state.systemData=defaultSystemData(); saveSystemData(); }
  const sd=state.systemData;
  // Migration auf v2: alte Vorgabeliste einmalig entfernen (Nutzer pflegt eigene Posten).
  if(sd.v!==2){ sd.abos=[]; sd.v=2; saveSystemData(); }
  // Sicherheitsnetz: jede Zeile hat name/eur/interval (monat|jahr).
  sd.abos.forEach(x=>{ if(typeof x.name!=="string") x.name=""; if(x.interval!=="jahr"&&x.interval!=="monat") x.interval="monat"; });
  return sd;
}
let _sysSaveT=null; function saveSystemDataSoon(){ clearTimeout(_sysSaveT); _sysSaveT=setTimeout(saveSystemData,400); }
function viewSystem(app){
  const wrap=el('<div></div>'); wrap.innerHTML=pageHead("System & Kosten","");
  const sd=systemState();

  // 1) System-Landkarte
  const mapC=sectionCard("System-Landkarte – was läuft wo");
  SYSTEM_SERVICES.forEach(sv=>mapC.appendChild(el('<div class="q-row"><span class="q-main"><b>'+esc(sv.n)+'</b> <span class="muted">'+esc(sv.d)+'</span></span><a class="btn btn-sm btn-ghost" href="'+safeUrl(sv.u)+'" target="_blank" rel="noopener">öffnen ↗</a></div>')));
  wrap.appendChild(mapC);

  // 2) Fixkosten – selbst verwaltet (Name · Betrag · monatlich/jährlich)
  const costC=el('<div class="card"></div>');
  costC.innerHTML='<div class="row"><h2 style="font-size:14px">Fixkosten</h2><span class="spacer"></span><b id="abo-sum" style="font-variant-numeric:tabular-nums"></b></div>';
  const listWrap=el('<div id="fix-list"></div>'); costC.appendChild(listWrap);
  const emptyHint=el('<p class="tiny muted" style="margin:10px 0">Noch keine Fixkosten. Tippe unten auf <b>+ Fixkosten</b>, trag Name und Betrag ein und wähle <b>monatlich</b> oder <b>jährlich</b>.</p>');
  const monthlyOf=x=>x.interval==="jahr"?num(x.eur,0)/12:num(x.eur,0);
  const recalcSum=()=>{ const sum=sd.abos.reduce((a,x)=>a+monthlyOf(x),0); const el2=costC.querySelector("#abo-sum"); if(el2) el2.textContent=fmtMoney(sum)+" / Mon · "+fmtMoney(sum*12)+" / Jahr"; return sum; };
  function renderFixRow(row){
    const r=el('<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 0;border-top:1px solid var(--line)"></div>');
    const nameI=el('<input type="text" placeholder="Bezeichnung (z. B. Shopify)" value="'+esc(row.name||"")+'" style="flex:1 1 100%">');
    nameI.oninput=()=>{ row.name=nameI.value; saveSystemDataSoon(); };
    const eurI=el('<input type="number" step="0.01" min="0" inputmode="decimal" value="'+num(row.eur,0)+'" style="flex:1 1 90px;max-width:110px;text-align:right">');
    const intS=el('<select style="flex:0 0 auto;width:auto"><option value="monat">monatlich</option><option value="jahr">jährlich</option></select>');
    intS.value=row.interval==="jahr"?"jahr":"monat";
    const hint=el('<span class="tiny muted" style="flex:1 1 100%;text-align:right"></span>');
    const paintHint=()=>{ hint.textContent = row.interval==="jahr" ? "= "+fmtMoney(num(row.eur,0)/12)+" / Monat" : ""; };
    const delB=el('<button class="btn btn-sm btn-ghost" title="Entfernen" aria-label="Entfernen" style="flex:0 0 auto;font-size:18px;line-height:1">×</button>');
    eurI.oninput=()=>{ row.eur=num(eurI.value,0); recalcSum(); recompute(); paintHint(); saveSystemDataSoon(); };
    intS.onchange=()=>{ row.interval=intS.value==="jahr"?"jahr":"monat"; recalcSum(); recompute(); paintHint(); saveSystemDataSoon(); };
    delB.onclick=()=>{ const i=sd.abos.indexOf(row); if(i>=0) sd.abos.splice(i,1); r.remove(); if(!sd.abos.length) listWrap.appendChild(emptyHint); recalcSum(); recompute(); saveSystemDataSoon(); };
    paintHint();
    r.appendChild(nameI); r.appendChild(eurI); r.appendChild(intS); r.appendChild(delB); r.appendChild(hint);
    return r;
  }
  if(!sd.abos.length){ listWrap.appendChild(emptyHint); } else { sd.abos.forEach(row=>listWrap.appendChild(renderFixRow(row))); }
  const addB=el('<button class="btn btn-sm btn-block" style="margin-top:14px">+ Fixkosten</button>');
  addB.onclick=()=>{ const row={name:"",eur:0,interval:"monat"}; sd.abos.push(row); if(sd.abos.length===1) listWrap.innerHTML=""; const rowEl=renderFixRow(row); listWrap.appendChild(rowEl); recalcSum(); recompute(); saveSystemDataSoon(); const inp=rowEl.querySelector('input[type=text]'); if(inp) inp.focus(); };
  costC.appendChild(addB);
  costC.appendChild(el('<p class="tiny muted" style="margin:12px 0 0">Manche Kosten sind monatlich, manche jährlich – wähl es pro Posten. Jährliches wird für die Summe automatisch auf den Monat umgerechnet. Anthropic (KI) ist nutzungsabhängig, kein Fixkosten-Abo.</p>'));
  wrap.appendChild(costC);

  // 3) Margen-Rechner
  const c=sd.calc;
  const calcC=el('<div class="card"></div>'); calcC.innerHTML='<h2 style="font-size:14px;margin-bottom:10px">Margen-Rechner</h2>';
  const fld=(label,key)=>{ const w=el('<label class="field"><span>'+esc(label)+'</span></label>'); const i=el('<input type="number" step="0.01" min="0" value="'+num(c[key],0)+'">'); i.oninput=()=>{ c[key]=num(i.value,0); recompute(); saveSystemDataSoon(); }; w.appendChild(i); return w; };
  [["Verkaufspreis (€)","preis"],["Materialkosten pro Set (€)","material"],["Verpackung pro Set (€)","verpackung"],["Versandkosten pro Bestellung (€)","versand"],["Zahlungsgebühr (%)","gebuehrPct"],["Bestellungen pro Monat","bestellungen"]].forEach(([l,k])=>calcC.appendChild(fld(l,k)));
  const out=el('<div style="margin-top:12px"></div>'); calcC.appendChild(out);
  function recompute(){
    const fix=sd.abos.reduce((a,x)=>a+(x.interval==="jahr"?num(x.eur,0)/12:num(x.eur,0)),0);
    const gebuehr=num(c.preis)*num(c.gebuehrPct)/100;
    const db=num(c.preis)-num(c.material)-num(c.verpackung)-num(c.versand)-gebuehr;
    const be=db>0?Math.ceil(fix/db):null;
    const gewinn=db*num(c.bestellungen)-fix;
    out.innerHTML=
      kv("Deckungsbeitrag / Bestellung","<b>"+esc(fmtMoney(db))+"</b>")+
      kv("Fixkosten / Monat",esc(fmtMoney(fix)))+
      kv("Break-even",be!=null?be+" Bestellungen / Monat":"— (Deckungsbeitrag ≤ 0)")+
      kv("Gewinn bei "+num(c.bestellungen)+" Bestellungen/Monat",'<b style="color:'+(gewinn>=0?"var(--ok)":"var(--danger)")+'">'+esc(fmtMoney(gewinn))+'</b>');
  }
  wrap.appendChild(calcC);
  recalcSum(); recompute();
  app.appendChild(wrap);
}

/* ---------- Backup ---------- */
function exportBackup(){
  const dump={ schemaVersion:SCHEMA_VERSION, exportedAt:new Date().toISOString(),
    settings:Object.assign({},state.settings,{apiKey:"",adminToken:""}),
    orders:state.orders, anliegen:state.anliegen, gaps:state.gaps, images:state.images, days:state.days };
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="miris-cockpit-backup-"+todayStr()+".json"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Backup exportiert");
}
function importBackup(file){
  if(!file) return; const rd=new FileReader(); rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(d.orders) state.orders=mapSanitize(d.orders,sanitizeOrder,"name");
    if(d.anliegen) state.anliegen=mapSanitize(d.anliegen,sanitizeAnliegen,"id");
    if(d.gaps) state.gaps=mapSanitize(d.gaps,sanitizeGap,"id");
    if(d.images) state.images=mapSanitize(d.images,sanitizeImage,"id");
    if(d.days) state.days=sanitizeDays(d.days);
    if(d.settings) state.settings=Object.assign({},state.settings,d.settings,{apiKey:state.settings.apiKey,adminToken:state.settings.adminToken});
    persist(["orders","anliegen","gaps","images","days","settings"]); flushSaves(); toast("Backup importiert"); render();
  }catch(e){ toast("Ungültiges Backup",4000); } }; rd.readAsText(file);
}

/* ======================================================================
   Init
   ====================================================================== */
/* ---------- Bildschirm-Sperre (einfacher Zugangscode beim Öffnen) ---------- */
const LOCK_CODE="231205";
function isUnlocked(){ try{ return sessionStorage.getItem("miris.unlocked")==="1"; }catch(e){ return !!window.__unlocked; } }
function setUnlocked(){ try{ sessionStorage.setItem("miris.unlocked","1"); }catch(e){ window.__unlocked=true; } }
/* Face ID / Touch ID via WebAuthn (Passkey-Technik, geräte- + domaingebunden). Code bleibt Rückfall. */
const FACEID_KEY="miris.faceid";
const RP_ID=location.hostname;
function b64uEnc(buf){ let s=""; const u=new Uint8Array(buf); for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64uDec(b64){ b64=b64.replace(/-/g,"+").replace(/_/g,"/"); while(b64.length%4)b64+="="; const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u.buffer; }
function faceIdSupported(){ return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create && (location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1")); }
function faceIdOn(){ try{ return !!localStorage.getItem(FACEID_KEY); }catch(e){ return false; } }
async function faceIdRegister(){
  const cred=await navigator.credentials.create({ publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    rp:{ name:"M.IRIS Cockpit", id:RP_ID },
    user:{ id:crypto.getRandomValues(new Uint8Array(16)), name:"miris", displayName:"M.IRIS" },
    pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
    authenticatorSelection:{ authenticatorAttachment:"platform", userVerification:"required" },
    timeout:60000, attestation:"none",
  }});
  localStorage.setItem(FACEID_KEY, b64uEnc(cred.rawId)); return true;
}
async function faceIdVerify(){
  const id=localStorage.getItem(FACEID_KEY); if(!id) return false;
  await navigator.credentials.get({ publicKey:{
    challenge:crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials:[{ type:"public-key", id:b64uDec(id) }],
    userVerification:"required", timeout:60000, rpId:RP_ID,
  }});
  return true;
}
function faceIdReset(){ try{ localStorage.removeItem(FACEID_KEY); }catch(e){} }
function doUnlock(){ setUnlocked(); const ls=document.getElementById("lockscreen"); if(ls){ ls.classList.remove("show"); ls.innerHTML=""; } startApp(); }

function showLock(){
  const ls=document.getElementById("lockscreen"); if(!ls) return;
  ls.classList.add("show");
  const canFace=faceIdSupported(), reg=faceIdOn();
  ls.innerHTML='<div class="lock-box"><img class="lock-logo" src="'+MIRIS_LOGO+'" alt="M.IRIS">'+
    (canFace&&reg?'<button class="btn btn-primary btn-block" id="lock-face">Mit Face ID entsperren</button><div class="lock-or">oder Code eingeben</div>':'<div class="lock-hint">Code eingeben</div>')+
    '<input id="lock-input" type="password" inputmode="numeric" autocomplete="off" maxlength="6" placeholder="••••••">'+
    '<button class="btn '+(canFace&&reg?"btn-ghost":"btn-primary")+' btn-block" id="lock-go">Entsperren</button>'+
    (canFace&&!reg?'<button class="btn btn-ghost btn-block" id="lock-face-setup">Face ID aktivieren</button>':'')+
    '<div class="lock-err" id="lock-err"></div></div>';
  const inp=ls.querySelector("#lock-input"), go=ls.querySelector("#lock-go"), err=ls.querySelector("#lock-err"), box=ls.querySelector(".lock-box");
  const shake=(msg)=>{ err.textContent=msg; box.classList.add("shake"); setTimeout(()=>box.classList.remove("shake"),400); };
  const codeAttempt=()=>{ if(inp.value===LOCK_CODE) doUnlock(); else { inp.value=""; shake("Falscher Code"); try{inp.focus();}catch(e){} } };
  go.onclick=codeAttempt;
  inp.addEventListener("input",()=>{ err.textContent=""; if(inp.value.length>=6) codeAttempt(); });
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") codeAttempt(); });
  const fb=ls.querySelector("#lock-face");
  if(fb) fb.onclick=async()=>{ err.textContent=""; fb.disabled=true; fb.textContent="Face ID…"; try{ await faceIdVerify(); doUnlock(); }catch(e){ fb.disabled=false; fb.textContent="Mit Face ID entsperren"; shake("Nicht erkannt – Code nutzen"); } };
  const fs=ls.querySelector("#lock-face-setup");
  if(fs) fs.onclick=async()=>{ err.textContent=""; fs.disabled=true; fs.textContent="Face ID…"; try{ await faceIdRegister(); doUnlock(); }catch(e){ fs.disabled=false; fs.textContent="Face ID aktivieren"; shake("Face ID nicht möglich"); } };
  if(!(canFace&&reg)) setTimeout(()=>{ try{ inp.focus(); }catch(e){} },120);
}
function startApp(){
  render();
  if(liveConfigured()) setTimeout(()=>doLiveSync({silent:true}),50);
}
function boot(){
  try{ loadState(); }catch(e){ console.error(e); }
  try{ const li=document.getElementById("tb-logo-img"); if(li) li.src=MIRIS_LOGO; }catch(e){}
  window.addEventListener("hashchange",()=>{ if(isUnlocked()) render(); });
  // PWA: Service-Worker (network-first, damit Updates sofort ankommen)
  try{ if("serviceWorker" in navigator && location.protocol==="https:") navigator.serviceWorker.register("sw.js").catch(()=>{}); }catch(e){}
  if(isUnlocked()) startApp(); else showLock();
}
boot();
